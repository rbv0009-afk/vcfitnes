<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Fitness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { bebas: ['"Bebas Neue"', 'cursive'] },
          colors:     { neon: '#d4fa00' },
        },
      },
    }
  </script>
</head>
<body class="bg-[#0a0f1a] overflow-hidden">

  <div class="relative w-screen h-screen overflow-hidden">

    <!-- COMIDA — triángulo superior izquierdo -->
    <a href="comida.html" class="absolute inset-0 group">
      <img
        src="img/comidaimg.png"
        alt="Comida"
        style="clip-path: polygon(0 0, 100% 0, 0 100%)"
        class="w-full h-full object-cover brightness-[0.82]
               transition-transform duration-700
               group-hover:scale-105 group-hover:brightness-100"
      />
      <span class="absolute top-6 left-6 md:top-10 md:left-10
                   font-bebas text-neon tracking-widest pointer-events-none
                   text-3xl md:text-5xl
                   drop-shadow-[0_0_14px_rgba(212,250,0,0.8)]
                   group-hover:drop-shadow-[0_0_28px_rgba(212,250,0,1)]
                   transition-all duration-300">
        Comida
      </span>
    </a>

    <!-- GYM — triángulo inferior derecho -->
    <a href="gym.html" class="absolute inset-0 group">
      <img
        src="img/gymvp.png"
        alt="Gym"
        style="clip-path: polygon(100% 0, 100% 100%, 0 100%)"
        class="w-full h-full object-cover brightness-[0.72]
               transition-transform duration-700
               group-hover:scale-105 group-hover:brightness-90"
      />
      <span class="absolute bottom-6 right-6 md:bottom-10 md:right-10
                   font-bebas text-neon tracking-widest pointer-events-none
                   text-3xl md:text-5xl
                   drop-shadow-[0_0_14px_rgba(212,250,0,0.8)]
                   group-hover:drop-shadow-[0_0_28px_rgba(212,250,0,1)]
                   transition-all duration-300">
        Gym
      </span>
    </a>

    <!-- LÍNEA DIAGONAL esquina sup-der → esquina inf-izq -->
    <div class="absolute inset-0 pointer-events-none z-10">
      <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none" overflow="visible">
        <defs>
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="0.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line x1="100" y1="0" x2="0" y2="100" stroke="rgba(0,0,0,0.5)"          stroke-width="0.6" vector-effect="non-scaling-stroke"/>
        <line x1="100" y1="0" x2="0" y2="100" stroke="#d4fa00"                   stroke-width="2.5" filter="url(#glow)" vector-effect="non-scaling-stroke"/>
        <line x1="100" y1="0" x2="0" y2="100" stroke="rgba(255,255,255,0.65)"    stroke-width="0.7" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>

    <!-- TÍTULO CENTRAL -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
      <div class="relative px-8 py-4 md:px-12 md:py-6
                  border border-[rgba(212,250,0,0.3)]
                  bg-[rgba(10,15,26,0.55)] backdrop-blur-md rounded-sm">

        <span class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-neon"></span>
        <span class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-neon"></span>

        <h1 class="font-bebas text-neon tracking-[0.18em] leading-none
                   text-4xl sm:text-5xl md:text-6xl lg:text-7xl
                   drop-shadow-[0_0_20px_rgba(212,250,0,0.6)]">
          VR&nbsp;Fitness
        </h1>
      </div>
    </div>

  </div>

</body>
</html>
