<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#181e2e] text-white min-h-screen flex items-center justify-center">


<div class="bg-[#ffffff0d] border border-[#ffffff17] rounded-2xl w-full max-w-md p-10 space-y-6">

<h2 class="text-3xl font-bold text-center">
<span class="text-[#d4fa00]">Iniciar</span> sesión
</h2>


<form class="space-y-5">

<div>
<label class="block text-gray-300 mb-1">Email</label>
<input
type="email"
placeholder="correo@email.com"
class="w-full px-4 py-3 rounded-lg bg-[#181e2e] border border-[#ffffff17] focus:border-[#d4fa00] outline-none">
</div>


<div>
<label class="block text-gray-300 mb-1">Contraseña</label>
<input
type="password"
placeholder="********"
class="w-full px-4 py-3 rounded-lg bg-[#181e2e] border border-[#ffffff17] focus:border-[#d4fa00] outline-none">
</div>


<button
class="w-full bg-[#d4fa00] text-black font-semibold py-3 rounded-lg hover:opacity-80 transition">

Entrar

</button>

</form>


<p class="text-center text-gray-400 text-sm">

¿No tienes cuenta?

<a href="Register.html" class="text-[#d4fa00] hover:underline">
Crear cuenta
</a>

</p>

</div>

</body>
</html>
