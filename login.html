<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black min-h-screen flex flex-col">

<!-- Barra superior -->
<header class="bg-black border-b border-green-500 h-20 flex items-center justify-center">

<h1 class="text-green-400 text-2xl font-bold tracking-widest">
FIT & FOOD
</h1>

</header>


<!-- Contenedor principal -->
<div class="flex flex-1 items-center justify-center p-6">

<div class="bg-neutral-900 border border-green-500 shadow-xl rounded-2xl w-full max-w-md p-8">

<h2 class="text-2xl font-bold text-center mb-6 text-green-400">
Crear cuenta
</h2>

<form class="space-y-5">

<!-- Usuario -->
<div>
<label class="block text-gray-300 mb-1">Usuario</label>

<input
type="text"
placeholder="Tu usuario"
class="w-full px-4 py-3 rounded-lg bg-black text-white border border-gray-700 focus:outline-none focus:border-green-400"
>
</div>


<!-- Email -->
<div>
<label class="block text-gray-300 mb-1">Email</label>

<input
type="email"
placeholder="correo@email.com"
class="w-full px-4 py-3 rounded-lg bg-black text-white border border-gray-700 focus:outline-none focus:border-green-400"
>
</div>


<!-- Contraseña -->
<div>
<label class="block text-gray-300 mb-1">Contraseña</label>

<input
type="password"
placeholder="********"
class="w-full px-4 py-3 rounded-lg bg-black text-white border border-gray-700 focus:outline-none focus:border-green-400"
>
</div>


<!-- Confirmar contraseña -->
<div>
<label class="block text-gray-300 mb-1">Confirmar contraseña</label>

<input
type="password"
placeholder="********"
class="w-full px-4 py-3 rounded-lg bg-black text-white border border-gray-700 focus:outline-none focus:border-green-400"
>
</div>


<!-- Botón -->
<button
type="submit"
class="w-full bg-green-500 text-black font-semibold py-3 rounded-lg hover:bg-green-400 transition"
>
Registrarse
</button>

</form>

</div>

</div>

</body>
</html>
