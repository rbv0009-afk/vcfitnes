<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Register — BR-Fitness</title>
  </head>
  <body class="bg-[#181e2e]">
    <div class="md:px-20 px-2">
      </div>

      <!-- CONTENIDO -->
      <main class="min-h-screen flex items-center justify-center py-12">
        <div class="w-full max-w-md">

          <!-- Card -->
          <div class="bg-[#1e2535] border border-[#ffffff17] rounded-2xl p-10 flex flex-col gap-8">

            <!-- Título -->
            <div class="flex flex-col gap-2">
              <p class="text-[#d4fa00] font-semibold text-sm">Get started today</p>
              <h2 class="text-white text-3xl font-extrabold">Create <span class="text-[#d4fa00]">Account</span></h2>
              <p class="text-gray-400 text-sm">Already have an account? <a href="login.html" class="text-[#d4fa00] hover:underline transition-[100ms] ease-in">Sign in</a></p>
            </div>

            <!-- Formulario -->
            <div class="flex flex-col gap-5">

              <!-- Nombre + Apellido -->
              <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                  <label class="text-white text-sm font-semibold">First name</label>
                  <input
                    type="text"
                    placeholder="John"
                    class="bg-[#181e2e] border border-[#ffffff17] rounded-[10px] px-4 py-3 text-white text-sm outline-none focus:border-[#d4fa00] transition-[100ms] ease-in placeholder:text-gray-600"
                  />
                </div>
                <div class="flex flex-col gap-2">
                  <label class="text-white text-sm font-semibold">Last name</label>
                  <input
                    type="text"
                    placeholder="Doe"
                    class="bg-[#181e2e] border border-[#ffffff17] rounded-[10px] px-4 py-3 text-white text-sm outline-none focus:border-[#d4fa00] transition-[100ms] ease-in placeholder:text-gray-600"
                  />
                </div>
              </div>

              <div class="flex flex-col gap-2">
                <label class="text-white text-sm font-semibold">Email</label>
                <input
                  type="email"
                  placeholder="you@example.com"
                  class="bg-[#181e2e] border border-[#ffffff17] rounded-[10px] px-4 py-3 text-white text-sm outline-none focus:border-[#d4fa00] transition-[100ms] ease-in placeholder:text-gray-600"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label class="text-white text-sm font-semibold">Password</label>
                <input
                  type="password"
                  placeholder="••••••••"
                  class="bg-[#181e2e] border border-[#ffffff17] rounded-[10px] px-4 py-3 text-white text-sm outline-none focus:border-[#d4fa00] transition-[100ms] ease-in placeholder:text-gray-600"
                />
              </div>

              <div class="flex flex-col gap-2">
                <label class="text-white text-sm font-semibold">Membership plan</label>
                <select class="bg-[#181e2e] border border-[#ffffff17] rounded-[10px] px-4 py-3 text-gray-400 text-sm outline-none focus:border-[#d4fa00] transition-[100ms] ease-in">
                  <option value="" disabled selected>Select a plan</option>
                  <option value="basic" class="text-white">Basic — $39/mo</option>
                  <option value="medium" class="text-white">Medium — $79/mo</option>
                  <option value="advanced" class="text-white">Advanced — $129/mo</option>
                </select>
              </div>

              <!-- Checkbox términos -->
              <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="mt-0.5 accent-[#d4fa00] w-4 h-4 shrink-0" />
                <span class="text-gray-400 text-sm">I agree to the <a href="#" class="text-[#d4fa00] hover:underline">Terms & Conditions</a> and <a href="#" class="text-[#d4fa00] hover:underline">Privacy Policy</a></span>
              </label>

              <button
                type="submit"
                class="w-full bg-[#d4fa00] border-2 border-[#d4fa00] text-black font-bold py-3 rounded-[10px] hover:bg-[#ffffff0a] hover:border-[#ffffff1b] hover:text-white transition-[100ms] ease-in mt-2"
              >
                Create Account
              </button>

            </div>

            <!-- Divider -->
            <div class="flex items-center gap-4">
              <div class="flex-1 h-px bg-[#ffffff1a]"></div>
              <span class="text-gray-500 text-xs">or sign up with</span>
              <div class="flex-1 h-px bg-[#ffffff1a]"></div>
            </div>

            <!-- Social buttons -->
            <div class="grid grid-cols-2 gap-4">
              <button class="flex items-center justify-center gap-2 bg-[#181e2e] border border-[#ffffff17] rounded-[10px] py-2.5 text-white text-sm font-semibold hover:border-[#d4fa00] transition-[100ms] ease-in">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
              </button>
              <button class="flex items-center justify-center gap-2 bg-[#181e2e] border border-[#ffffff17] rounded-[10px] py-2.5 text-white text-sm font-semibold hover:border-[#d4fa00] transition-[100ms] ease-in">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
              </button>
            </div>

          </div>
        </div>
      </main>

    </div>
  </body>
</html>
